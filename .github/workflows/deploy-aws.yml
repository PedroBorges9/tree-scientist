name: Deploy static site to AWS

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build deploy folder
        run: npm run build

      - name: Upload to S3
        run: |
          aws s3 sync build "s3://${{ vars.AWS_S3_BUCKET }}" \
            --delete \
            --cache-control "public,max-age=300"

      - name: Set long cache headers for static assets
        run: |
          aws s3 sync build/assets "s3://${{ vars.AWS_S3_BUCKET }}/assets" \
            --delete \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 sync build/src "s3://${{ vars.AWS_S3_BUCKET }}/src" \
            --delete \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 sync build/data "s3://${{ vars.AWS_S3_BUCKET }}/data" \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

      - name: Invalidate CloudFront cache
        if: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
